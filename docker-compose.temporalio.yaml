#ddev-generated

services:

  temporalio-server:
    container_name: ddev-${DDEV_SITENAME}-temporalio-server
    build:
      context: .
      dockerfile: ./temporalio/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB=mysql8
      - DB_PORT=3306
      - MYSQL_USER=db
      - MYSQL_PWD=db
      - MYSQL_SEEDS=db
      - BIND_ON_IP=0.0.0.0
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - DEFAULT_NAMESPACE=default
      # This is needed for the namespace creating script.
      - TEMPORAL_ADDRESS=temporalio-server:7233
    volumes:
      - ./temporalio/dynamicconfig:/etc/temporal/config/dynamicconfig
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}

  temporalio-ui:
    container_name: ddev-${DDEV_SITENAME}-temporalio-ui
    depends_on:
      temporalio-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporalio-server:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    image: temporalio/ui
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
